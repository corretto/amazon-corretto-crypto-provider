name: JCA Conformance

# Runs the JCA/JCE-relevant subset of the OpenJDK jtreg suite against ACCP to
# catch behavioral divergence from the JDK-default providers. See
# tests/jca-conformance/README.md and issue #550.
#
# Branch 1 (this commit) wires the harness in --smoke mode: it validates that
# ACCP installs as the highest-priority provider and that the exclusion/roots
# config parses, without checking out the OpenJDK test tree. Branch 2 switches
# the run to --full and (once the suite is green via exclusions) the job can be
# made gating.

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  jca-conformance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jdk: ['17', '21']
    name: jtreg (JDK ${{ matrix.jdk }})
    steps:
      - name: Set up Corretto ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.jdk }}
          distribution: 'corretto'

      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build ACCP
        env:
          TEST_JAVA_HOME: ${{ env.JAVA_HOME }}
        run: ./gradlew build -x test

      - name: Run JCA conformance harness
        env:
          TEST_JAVA_HOME: ${{ env.JAVA_HOME }}
          ACCP_JAR: ${{ github.workspace }}/build/cmake/AmazonCorrettoCryptoProvider.jar
        # --smoke validates harness wiring. Branch 2 switches this to --full.
        run: ./tests/jca-conformance/run-jtreg.sh --smoke
